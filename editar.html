<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar artículo</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>
  <main class="pagina-editar">
    <form class="form-editar">
      <h2>Editar artículo</h2>
      <div class="imagen-preview">
        <img src="imagenes/martillo.webp" id="preview">
        <label for="nueva-imagen" class="btn-imagen">Cambiar imagen</label>
        <input type="file" id="nueva-imagen" accept="image/*">
      </div>
      <label for="nombre">Nombre del artículo</label>
      <input type="text" id="nombre" value="Martillo">
      <label for="descripcion">Descripción</label>
      <textarea id="descripcion" rows="5">Herramienta de mano ideal para clavar, extraer clavos y trabajos de construcción.</textarea>
      <label for="categoria">Categoría</label>
      <select id="categoria">
        <option value="herramienta">Herramienta</option>
        <option value="material">Materiales</option>
      </select>
      <div class="botones">
        <button type="submit" class="btn-guardar">Guardar</button>
        <a href="panel-control.html" class="btn-cancelar">Cancelar</a>
      </div>
    </form>
  </main>
</body>
</html>
