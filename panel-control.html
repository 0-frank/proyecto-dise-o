<!DOCTYPE html>
<html lang="en">

    <title>Panel de control</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>

        <nav>
            <a href="#nuevo-articulo">Nuevo articulo</a>

            <a href="#editar-articulo">Editar articulo</a>
            <a href="">Cerrar sesion</a>
        </nav>
    </header>

    <main>
        <div id="nuevo-articulo" class="seccion">

                <input type="text" id="nombre-articulo">
                <label for="categoria">Selecciona la categoria</label>
                <select id="categoria-select">
                    <option value="herramienta">Herramienta</option>
                    <option value="material">Materiales</option>
                </select>
                <button>Añadir</button>
            </form>
        </div>

        <div id="baja-articulo" class="seccion">
            
        </div>

        <div id="editar-articulo" class="secction">

        </div>
    </main>
    <footer>

    </footer>
</body>

</html>
